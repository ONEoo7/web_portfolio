# ──────────────────────────────────────────────────────────────────────────────
# HTTP-only site config for Synology NAS deployment.
#
# TLS is terminated by DSM's reverse proxy (Control Panel → Login Portal →
# Advanced → Reverse Proxy), which forwards to this container on a plain-HTTP
# port. So there is NO ssl_certificate / 443 / certbot here — DSM owns the
# public hostname and the Let's Encrypt certificate.
# ──────────────────────────────────────────────────────────────────────────────

server {
    listen      80;
    listen      [::]:80;
    server_name _;

    # DSM's reverse proxy is the only client that reaches us; it connects from
    # the Docker bridge gateway and passes the real visitor IP in X-Forwarded-For.
    # Recover it so GoAccess logs real client IPs (and rate limiting is per-visitor).
    set_real_ip_from 172.20.0.0/24;
    real_ip_header   X-Forwarded-For;
    real_ip_recursive on;

    # Health endpoint for the container healthcheck.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Rate Limiting ──────────────────────────────────────────────────────────
    limit_req  zone=general burst=60 nodelay;
    limit_conn addr 20;

    # ── Security Headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    # HSTS is set by DSM's reverse proxy (it owns TLS). Don't duplicate it here.

    # ── Cache static assets ────────────────────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        proxy_pass http://app;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ── CopilotKit / RAG chat API (streaming SSE) ──────────────────────────────
    location /api/copilotkit {
        limit_req  zone=general burst=20 nodelay;

        proxy_pass         http://api:8080/copilotkit;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 5m;
        proxy_send_timeout 5m;
        proxy_set_header   Connection "";
    }

    # ── Resume PDFs generated on-demand by the api from content/*.md ───────────
    location ^~ /api/resume/ {
        proxy_pass         http://api:8080/resume/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Live-editable markdown content (page sections) ─────────────────────────
    location ^~ /content/ {
        alias /srv/content/;
        add_header Cache-Control "no-cache" always;
        access_log off;
    }

    # ── GoAccess traffic dashboard (basic-auth protected) ──────────────────────
    location ^~ /analytics/ {
        alias /srv/analytics/;
        index index.html;
        try_files $uri $uri/ /index.html;

        auth_basic           "Portfolio analytics";
        auth_basic_user_file /etc/nginx/auth/htpasswd;

        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; base-uri 'self'; frame-ancestors 'none';" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        access_log off;
    }

    # ── Block common attack paths ──────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    location ~* \.(sql|log|bak|conf|ini|sh|py|rb|php)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Proxy to app container ─────────────────────────────────────────────────
    location / {
        limit_req zone=general burst=60 nodelay;

        proxy_pass         http://app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;
        proxy_hide_header  Server;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    error_page 404              /404.html;
    error_page 500 502 503 504  /50x.html;
}
