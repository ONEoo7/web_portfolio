# ──────────────────────────────────────────────────────────────────────────────
# SSL Hardening Parameters
# Shared across all HTTPS server blocks
# ──────────────────────────────────────────────────────────────────────────────

# ── Protocol: TLS 1.2 + 1.3 only (1.0 and 1.1 are deprecated/insecure) ───────
ssl_protocols TLSv1.2 TLSv1.3;

# ── Cipher suites ─────────────────────────────────────────────────────────────
# Modern, strong ciphers only. Prefer server's order over client's.
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers off;   # Let TLS 1.3 negotiate freely

# ── Diffie-Hellman params (generated by init-letsencrypt.sh) ──────────────────
ssl_dhparam /etc/nginx/dhparam/dhparam.pem;

# ── Session caching ───────────────────────────────────────────────────────────
ssl_session_timeout 1d;
ssl_session_cache   shared:SSL:10m;   # ~40,000 sessions
ssl_session_tickets off;              # disable — tickets are a privacy risk

# ── OCSP Stapling — proves cert hasn't been revoked without client contacting CA
ssl_stapling        on;
ssl_stapling_verify on;
resolver            1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout    5s;
