# ──────────────────────────────────────────────────────────────────────────────
# Synology NAS deployment (DS920+ / DSM 7, Container Manager).
#
# Differences from the main docker-compose.yml:
#   • No certbot, no SSL inside the stack — DSM's reverse proxy terminates TLS
#     and owns the Let's Encrypt cert for your DDNS hostname.
#   • nginx publishes ONE plain-HTTP port (8088) for DSM to proxy to, instead
#     of binding 80/443 (which DSM itself uses).
#   • The api talks to LM Studio / LiteLLM on your Windows PC over the LAN —
#     set LITELLM_URL in .env to that machine's LAN IP (e.g. http://192.168.1.50:4000).
#
# Run on the NAS from the project directory:
#   docker compose -f docker-compose.nas.yml up -d --build
# (or import as a Project in Container Manager). See docs/DEPLOY-SYNOLOGY.md.
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── NGINX — internal HTTP router (behind DSM reverse proxy) ────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: portfolio-nginx
    restart: unless-stopped
    ports:
      - "8088:80"     # DSM reverse proxy → http://localhost:8088
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-nas/conf.d:/etc/nginx/conf.d:ro
      - ./content:/srv/content:ro
      - ./analytics:/srv/analytics:ro
      - ./nginx/auth/htpasswd:/etc/nginx/auth/htpasswd:ro
      - nginx-logs:/var/log/nginx
    networks:
      - frontend
    depends_on:
      - app
      - api
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── APP — static Vite build ────────────────────────────────────────────────
  app:
    image: nginx:1.27-alpine
    container_name: portfolio-app
    restart: unless-stopped
    volumes:
      - ./app:/usr/share/nginx/html:ro
    networks:
      - frontend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── API — CopilotKit runtime + RAG + resume generator ──────────────────────
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: portfolio-api
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=8080
      # Point at LM Studio / LiteLLM on the Windows PC over the LAN.
      - LITELLM_URL=${LITELLM_URL}
      - LITELLM_API_KEY=${LITELLM_MASTER_KEY}
      - CONTENT_DIR=/app/content
      - PROMPT_PATH=/app/prompts/system.md
      - INDEX_PATH=/app/index.json
      - COPILOT_MODEL=${COPILOT_MODEL}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - SITE_URL=${SITE_URL}
      - RESUME_NAME=${RESUME_NAME}
    volumes:
      - ./content:/app/content:ro
      - ./prompts:/app/prompts:ro
    networks:
      - frontend
    expose:
      - "8080"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ── GOACCESS — analytics from nginx logs ───────────────────────────────────
  goaccess:
    image: allinurl/goaccess:1.9.4
    container_name: portfolio-goaccess
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/usr/local/bin/goaccess-loop.sh"]
    volumes:
      - nginx-logs:/var/log/nginx:ro
      - ./analytics:/srv/analytics
      - ./geoip:/geoip:ro
      - ./scripts/goaccess-loop.sh:/usr/local/bin/goaccess-loop.sh:ro
    networks:
      - frontend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ── GEOIP-UPDATER — daily DB-IP refresh ────────────────────────────────────
  geoip-updater:
    image: alpine:3.20
    container_name: portfolio-geoip-updater
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/usr/local/bin/refresh-geoip.sh"]
    volumes:
      - ./geoip:/geoip
      - ./scripts/refresh-geoip.sh:/usr/local/bin/refresh-geoip.sh:ro
    networks:
      - frontend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  nginx-logs:

networks:
  frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
