# ──────────────────────────────────────────────────────────────────────────────
# HTTPS — Main Portfolio Site
# ──────────────────────────────────────────────────────────────────────────────

server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name oneoo7x.asuscomm.com;  # ← replace with your DDNS address

    # ── SSL Certificates (issued by Certbot) ───────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/oneoo7x.asuscomm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oneoo7x.asuscomm.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/oneoo7x.asuscomm.com/chain.pem;

    # Load shared SSL hardening params
    include /etc/nginx/ssl-params.conf;

    # ── Rate Limiting ──────────────────────────────────────────────────────────
    limit_req  zone=general burst=60 nodelay;
    limit_conn addr 20;

    # ── Security Headers ───────────────────────────────────────────────────────
    # Force HTTPS for 1 year, include subdomains, allow preload registration
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Deny embedding in iframes (clickjacking protection)
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Block XSS in older browsers
    add_header X-XSS-Protection "1; mode=block" always;

    # Control referrer info sent to other sites
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Disable browser features you don't need
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Content Security Policy — tighten as needed for your actual content
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ── Cache static assets ────────────────────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        proxy_pass http://app;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ── CopilotKit / RAG chat API (streaming SSE) ──────────────────────────────
    location /api/copilotkit {
        # Stricter limits for chat traffic
        limit_req  zone=general burst=20 nodelay;

        proxy_pass         http://api:8080/copilotkit;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE streaming — disable buffering, allow long-lived connections
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 5m;
        proxy_send_timeout 5m;

        # No upgrade header needed for SSE; keep Connection close-ish
        proxy_set_header   Connection "";
    }

    # ── Live-editable markdown content (page sections) ─────────────────────────
    # Served directly from ./content on the host (read-only bind mount).
    # Edit any file in content/ on disk and refresh the page — no rebuild.
    location /content/ {
        alias /srv/content/;
        types { } default_type "text/markdown; charset=utf-8";
        add_header Cache-Control "no-cache" always;
        access_log off;
    }

    # ── Block common attack paths ──────────────────────────────────────────────
    location ~ /\. {
        deny all;           # block dot files (.git, .env, etc.)
        access_log off;
        log_not_found off;
    }

    location ~* \.(sql|log|bak|conf|ini|sh|py|rb|php)$ {
        deny all;           # block sensitive file extensions
        access_log off;
        log_not_found off;
    }

    # ── Proxy to app container ─────────────────────────────────────────────────
    location / {
        limit_req zone=general burst=60 nodelay;

        proxy_pass         http://app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Strip server info from upstream responses
        proxy_hide_header  X-Powered-By;
        proxy_hide_header  Server;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Custom error pages ─────────────────────────────────────────────────────
    error_page 404              /404.html;
    error_page 500 502 503 504  /50x.html;
}
