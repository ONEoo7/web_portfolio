# ──────────────────────────────────────────────────────────────────────────────
# HTTP → HTTPS redirect
# Also serves the ACME challenge path for Let's Encrypt cert renewal
# ──────────────────────────────────────────────────────────────────────────────

server {
    listen      80;
    listen      [::]:80;
    server_name YOUR_DDNS_DOMAIN.example.com;  # ← replace with your DDNS address

    # Let's Encrypt ACME challenge — must be on HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health check endpoint (used by Docker healthcheck)
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
