services:

  # ─────────────────────────────────────────
  # NGINX — Reverse Proxy & SSL Termination
  # ─────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl/ssl-params.conf:/etc/nginx/ssl-params.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - certbot-dhparam:/etc/nginx/dhparam:ro
      - ./content:/srv/content:ro
      - ./analytics:/srv/analytics:ro
      - ./nginx/auth/htpasswd:/etc/nginx/auth/htpasswd:ro
      - nginx-logs:/var/log/nginx
    networks:
      - frontend
    depends_on:
      - app
      - api
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE       # needed to bind ports 80/443
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    # Reload nginx every 12h so renewed certs are picked up
    command: >
      /bin/sh -c "while :; do sleep 12h; nginx -s reload; done & nginx -g 'daemon off;'"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────
  # CERTBOT — Let's Encrypt Certificate Manager
  # ─────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - certbot-dhparam:/etc/nginx/dhparam
    networks:
      - frontend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Renew every 12h; certbot only acts when cert is <30d from expiry
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done"

  # ─────────────────────────────────────────
  # APP — Your Portfolio (Static Site)
  # ─────────────────────────────────────────
  app:
    image: nginx:1.27-alpine
    container_name: portfolio-app
    restart: unless-stopped
    volumes:
      - ./app:/usr/share/nginx/html:ro
    networks:
      - frontend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    expose:
      - "80"          # internal only — NOT published to host
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────
  # API — CopilotKit runtime + RAG retriever
  # ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: portfolio-api
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=8080
      - LITELLM_URL=${LITELLM_URL}
      - LITELLM_API_KEY=${LITELLM_MASTER_KEY}
      - CONTENT_DIR=/app/content
      - PROMPT_PATH=/app/prompts/system.md
      - INDEX_PATH=/app/index.json
      - COPILOT_MODEL=${COPILOT_MODEL}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
    volumes:
      - ./content:/app/content:ro
      - ./prompts:/app/prompts:ro
    networks:
      - frontend
    expose:
      - "8080"         # internal only
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # GOACCESS — Traffic analytics from nginx logs
  # Re-parses /var/log/nginx/portfolio.access.log every 5 min and renders an HTML
  # report at ./analytics/index.html, which nginx serves at /analytics/
  # behind basic auth.
  # ─────────────────────────────────────────
  goaccess:
    image: allinurl/goaccess:1.9.4
    container_name: portfolio-goaccess
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        while :; do
          if [ -s /var/log/nginx/portfolio.access.log ]; then
            goaccess /var/log/nginx/portfolio.access.log
              --log-format=COMBINED
              --output=/srv/analytics/index.html
              --no-progress
              --html-report-title="Portfolio analytics" || true;
          fi;
          sleep 300;
        done
    volumes:
      - nginx-logs:/var/log/nginx:ro
      - ./analytics:/srv/analytics
    networks:
      - frontend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  certbot-dhparam:  # persists the generated DH params
  nginx-logs:       # shared between nginx (writer) and goaccess (reader)

networks:
  frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
